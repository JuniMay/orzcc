[package]
name = "orzcc"
version = "0.1.0"
edition = "2021"
build = "build.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
lalrpop = "0.20.2"

[dependencies]
clap = "4.5.7"
thiserror = "1.0.61"
hexponent = {version = "0.3.1", default-features = false}
lalrpop-util = { version = "0.20.2", features = ["lexer"] }
regex = "1.10.4"
